<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=Enriqueta:wght@400;500;600;700&family=Libre+Caslon+Display&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <title>Tayyaba Shehryar Official</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body style= "margin: 0; padding: 0; border: 0; width: 100%; height: 100%; background: white;">
  <div style="position: fixed; margin-top: 0; padding: 0; border: 0; top: 0; left: 0; z-index: 999;">
    <div style="display: flex;"  onclick = "navHome()">
      <img
        src="logo.jpeg"
        alt="Logo"
        style="height:20vh; margin-top:0; margin-left:0; padding: 0; border: 0;"
      />
      <div style = "background-color:black; color:rgb(255,203,31);width:100vw; height:20vh; margin:0; padding: 0; border: 0; font-family: 'Libre Calson Display', serif; font-size: 3em; font-weight: lighter;"><p style = "margin: 0;">Tayyaba Shehryar</p></div>
    </div>
    <div style="display: flex;">
        <div class = "shopdirect" onclick = "filteradd('rings'); qualifyItems();" style="height: 5vh; width: 20vw;"> <p>Rings</p> </div>
        <div class = "shopdirect" onclick = "filteradd('earrings'); qualifyItems();" style="height: 5vh; width: 20vw;"> <p>Earrings</p> </div>
        <div class = "shopdirect" onclick = "filteradd('bracelets'); qualifyItems();" style="height: 5vh; width: 20vw;"> <p>Bracelets</p> </div>
        <div class = "shopdirect" onclick = "filteradd('necklaces'); qualifyItems();" style="height: 5vh; width: 20vw;"> <p>Necklaces</p> </div>
        <div class = "shopdirect" onclick = "filteradd('bridals'); qualifyItems();" style="height: 5vh; width: 20vw;"> <p>Bridal Sets</p> </div>
    </div>
  </div>
  <div style="display: flex; margin-top: 30vh;">
    <div style = "width: 20vw; background-color: red; margin-top: 0;"></div>
    <div class = "merchandise" style = "margin-top: 2.5vh;">
      <div data-list = "rings, red"; style = "background-color: black;" onclick = "qualifyItems()">1</div>
      <div data-list = "bridals, orange"; style = "background-color: red;">2</div>
      <div data-list = "rings, yellow"; style = "background-color: black;">3</div>
      <div data-list = "rings, green"; style = "background-color: black;">4</div>
      <div data-list = "necklaces, blue"; style = "background-color: blue;">5</div>
      <div data-list = "bracelets, purple"; style = "background-color: green;">6</div>
      <div data-list = "bracelets, black"; style = "background-color: green;">7</div>
      <div data-list = "necklaces, white"; style = "background-color: blue;">8</div>
    </div>
  </div>
  <script src="script.js">
  </script>
